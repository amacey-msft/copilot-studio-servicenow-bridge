services:
  bridge:
    # Build from repo root so the image can include both bridge/ and web/.
    build:
      context: ..
      dockerfile: bridge/Dockerfile
    image: copilot-studio-servicenow-bridge:dev
    env_file: .env
    ports:
      # Host 5001 -> container 5000 (5000 is often busy on dev machines).
      - "5001:5000"
    # Mount source so edits to web/, bridge/, and teams_bot/ apply on
    # container restart without a full image rebuild.
    volumes:
      - ../web:/app/web:ro
      - ./app.py:/app/bridge/app.py:ro
      - ./servicenow_bridge.py:/app/bridge/servicenow_bridge.py:ro
      - ../teams_bot:/app/teams_bot:ro
    restart: unless-stopped
